<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile Spacing.js · 演示</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --brand: #3b82f6;
      --brand-2: #ef4444;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: 16px 16px 120px;
    }
    header { text-align: center; margin-bottom: 20px; }
    h1 { margin: 0 0 4px; font-size: 20px; }
    p.lead { margin: 0; color: var(--muted); font-size: 13px; }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin: 14px 0;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      border: 1px solid var(--line);
    }
    .card h2 { font-size: 15px; margin: 0 0 10px; color: var(--muted); font-weight: 600; }

    /* 场景 1：横向卡片 */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .tile {
      border-radius: 10px;
      padding: 18px 12px;
      color: #fff;
      text-align: center;
      font-weight: 600;
    }
    .tile.blue { background: #3b82f6; }
    .tile.pink { background: #ec4899; }
    .tile.green { background: #10b981; }
    .tile.amber { background: #f59e0b; }

    /* 场景 2：不同尺寸 */
    .stack { display: flex; flex-direction: column; gap: 14px; align-items: center; }
    .box {
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #3730a3;
      border-radius: 8px;
      padding: 10px;
      font-size: 13px;
      display: flex; align-items: center; justify-content: center;
    }
    .box.sm { width: 80px; height: 40px; }
    .box.md { width: 160px; height: 60px; }
    .box.lg { width: 240px; height: 80px; }

    /* 场景 3：按钮组 */
    .btns { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      appearance: none;
      border: 0;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: var(--brand);
    }
    .btn.ghost { background: transparent; color: var(--brand); border: 1px solid var(--brand); }
    .btn.danger { background: var(--brand-2); }

    /* 场景 4：文本行 */
    .text-block h3 { margin: 0 0 6px; font-size: 16px; }
    .text-block p { margin: 0 0 12px; color: var(--muted); font-size: 13px; }

    /* 提示 */
    .tip {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 60px;
      background: rgba(17,24,39,0.9);
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.5;
      z-index: 10;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }
    .tip b { color: #f59e0b; }
  </style>
</head>
<body>
  <header>
    <h1>Mobile Spacing.js</h1>
    <p class="lead">长按选中两个元素 · 显示间距</p>
  </header>

  <div class="card">
    <h2>场景 1 · 并排卡片</h2>
    <div class="row-2">
      <div class="tile blue">A</div>
      <div class="tile pink">B</div>
    </div>
  </div>

  <div class="card">
    <h2>场景 2 · 不同尺寸</h2>
    <div class="stack">
      <div class="box sm">small</div>
      <div class="box md">medium</div>
      <div class="box lg">large</div>
    </div>
  </div>

  <div class="card">
    <h2>场景 3 · 按钮组</h2>
    <div class="btns">
      <button class="btn">主按钮</button>
      <button class="btn ghost">次按钮</button>
      <button class="btn danger">危险</button>
    </div>
  </div>

  <div class="card text-block">
    <h2>场景 4 · 文本间距</h2>
    <h3>标题一</h3>
    <p>这是一段说明文字，可以尝试测量标题和段落之间的间距。</p>
    <h3>标题二</h3>
    <p>再来一段。</p>
  </div>

  <div class="tip">
    <b>提示</b>：长按任意元素 <b>≈0.45s</b> 触发选中；<br />
    第一次长按 → 第一个元素（红），第二次长按 → 第二个元素（蓝），底部工具栏可以清除或关闭。
  </div>

  <script src="./spacing.js"></script>
</body>
</html>
